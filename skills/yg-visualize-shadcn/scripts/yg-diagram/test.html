<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yg-diagram 测试</title>
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; }
    .test-case { margin: 20px 0; padding: 20px; background: white; border-radius: 8px; }
    .diagram-container { border: 1px solid #ddd; border-radius: 8px; min-height: 300px; }
    .diagram-popover {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 1000;
    }
    .popover-title { font-weight: 600; margin-bottom: 4px; }
    .popover-desc { font-size: 14px; color: #666; }
    .popover-meta { margin-top: 8px; font-size: 12px; }
    .popover-meta span { margin-right: 12px; }
  </style>
</head>
<body>
  <h1>yg-diagram 测试页面</h1>

  <div class="test-case">
    <h2>流程图测试 - 用户登录流程</h2>
    <div id="flowchart-test" class="diagram-container"></div>
  </div>

  <script type="module">
    // 引入核心渲染器（实际使用时改为正确路径）
    // import YGDiagram from './index.js';

    // 测试配置
    const flowchartConfig = {
      type: 'flowchart',
      title: '用户登录流程',
      theme: 'light',
      nodes: [
        { id: 'start', label: '开始', type: 'terminal' },
        { id: 'input', label: '输入账号密码', type: 'process' },
        { id: 'check', label: '验证成功?', type: 'decision' },
        { id: 'success', label: '进入首页', type: 'process' },
        { id: 'fail', label: '提示错误', type: 'process' },
        { id: 'end', label: '结束', type: 'terminal' },
      ],
      edges: [
        { from: 'start', to: 'input' },
        { from: 'input', to: 'check' },
        { from: 'check', to: 'success', label: '是' },
        { from: 'check', to: 'fail', label: '否' },
        { from: 'success', to: 'end' },
        { from: 'fail', to: 'input' },
      ],
    };

    // 简单测试：使用 Konva 直接渲染
    console.log('测试配置:', flowchartConfig);
    console.log('Konva 版本:', Konva.version);

    // 创建 Stage
    const stage = new Konva.Stage({
      container: 'flowchart-test',
      width: 600,
      height: 400,
    });

    const layer = new Konva.Layer();
    stage.add(layer);

    // 绘制标题
    const title = new Konva.Text({
      text: flowchartConfig.title,
      fontSize: 16,
      fontStyle: '600',
      fill: '#333',
      x: 300,
      y: 20,
      align: 'center',
    });
    title.offsetX(title.width() / 2);
    layer.add(title);

    // 绘制简单节点（垂直排列）
    const nodeWidth = 120;
    const nodeHeight = 40;
    const startY = 60;

    flowchartConfig.nodes.forEach((node, i) => {
      const group = new Konva.Group({
        x: 240,
        y: startY + i * 60,
      });

      const rect = new Konva.Rect({
        width: nodeWidth,
        height: nodeHeight,
        fill: node.type === 'terminal' ? '#10b981' : '#3b82f6',
        cornerRadius: node.type === 'terminal' ? nodeHeight / 2 : 8,
      });

      const text = new Konva.Text({
        text: node.label,
        fontSize: 14,
        fill: 'white',
        width: nodeWidth,
        align: 'center',
        y: 12,
      });

      group.add(rect);
      group.add(text);
      layer.add(group);
    });

    layer.draw();
    console.log('✅ 基础渲染测试完成');
  </script>
</body>
</html>

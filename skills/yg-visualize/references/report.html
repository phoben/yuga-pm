<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__REPORT_TITLE__</title>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Highlight.js -->
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/dist/highlight.min.js"></script>

  <style>
    /* =============================================
       SHADCN/UI THEME — DARK & LIGHT SUPPORT
       ============================================= */
    :root {
      /* Layout */
      --sidebar-width: 260px;
      --header-height: 64px;
      /* Radius */
      --radius: 0.5rem;
      /* 语义颜色（主题无关） */
      --success: 142 76% 36%;
      --success-foreground: 143 85% 96%;
      --warning: 38 92% 50%;
      --warning-foreground: 48 96% 89%;
      --info: 217 91% 60%;
      --info-foreground: 212 100% 97%;
    }

    /* 深色主题（默认） */
    :root, :root.dark {
      /* Base Colors (HSL format) */
      --background: 0 0% 3.9%;
      --foreground: 0 0% 98%;
      --card: 0 0% 3.9%;
      --card-foreground: 0 0% 98%;
      --popover: 0 0% 3.9%;
      --popover-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 0 0% 9%;
      --secondary: 0 0% 14.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 0 0% 14.9%;
      --muted-foreground: 0 0% 63.9%;
      --accent: 0 0% 14.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 0 0% 14.9%;
      --input: 0 0% 14.9%;
      --ring: 0 0% 83.1%;
    }

    /* 浅色主题 */
    :root.light {
      --background: 0 0% 100%;
      --foreground: 0 0% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 0 0% 3.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 0 0% 3.9%;
      --primary: 0 0% 9%;
      --primary-foreground: 0 0% 98%;
      --secondary: 0 0% 96.1%;
      --secondary-foreground: 0 0% 9%;
      --muted: 0 0% 96.1%;
      --muted-foreground: 0 0% 45.1%;
      --accent: 0 0% 96.1%;
      --accent-foreground: 0 0% 9%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 0 0% 89.8%;
      --input: 0 0% 89.8%;
      --ring: 0 0% 3.9%;
    }

    /* CSS color() function fallbacks */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      line-height: 1.6;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========== UTILITY CLASSES ========== */
    .text-foreground { color: hsl(var(--foreground)); }
    .text-muted-foreground { color: hsl(var(--muted-foreground)); }
    .text-primary { color: hsl(var(--primary)); }
    .text-secondary { color: hsl(var(--secondary-foreground)); }
    .text-destructive { color: hsl(var(--destructive)); }
    .text-success { color: hsl(var(--success)); }
    .text-warning { color: hsl(var(--warning)); }
    .text-info { color: hsl(var(--info)); }

    .bg-background { background-color: hsl(var(--background)); }
    .bg-card { background-color: hsl(var(--card)); }
    .bg-muted { background-color: hsl(var(--muted)); }
    .bg-primary { background-color: hsl(var(--primary)); }
    .bg-secondary { background-color: hsl(var(--secondary)); }
    .bg-destructive { background-color: hsl(var(--destructive)); }

    .border-border { border-color: hsl(var(--border)); }
    .border-destructive { border-color: hsl(var(--destructive)); }
    .border-success { border-color: hsl(var(--success)); }
    .border-warning { border-color: hsl(var(--warning)); }
    .border-info { border-color: hsl(var(--info)); }

    /* ========== LUCIDE ICONS ========== */
    .lucide {
      width: 16px;
      height: 16px;
      display: inline-block;
      vertical-align: middle;
    }
    .lucide-sm { width: 14px; height: 14px; }
    .lucide-lg { width: 20px; height: 20px; }
    .lucide-xl { width: 24px; height: 24px; }

    /* ========== TOP HEADER ========== */
    .top-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .top-header h1 {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-header .meta {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .top-header .meta .badge {
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
    }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ========== THEME TOGGLE BUTTON ========== */
    .theme-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: hsl(var(--secondary));
      border: 1px solid hsl(var(--border));
      color: hsl(var(--muted-foreground));
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .theme-toggle-btn:hover {
      background: hsl(var(--muted));
      color: hsl(var(--foreground));
    }
    .theme-toggle-btn .lucide { width: 18px; height: 18px; }
    .theme-toggle-btn .hidden { display: none; }

    /* 主题切换过渡动画 */
    html.transitioning,
    html.transitioning *,
    html.transitioning *::before,
    html.transitioning *::after {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease !important;
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      width: var(--sidebar-width);
      bottom: 0;
      background: hsl(var(--card));
      border-right: 1px solid hsl(var(--border));
      overflow-y: auto;
      z-index: 100;
      padding: 16px 0;
    }
    .sidebar-section { margin-bottom: 8px; }
    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: hsl(var(--muted-foreground));
      padding: 8px 16px 4px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      color: hsl(var(--muted-foreground));
      text-decoration: none;
      font-size: 13px;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .sidebar-item:hover {
      color: hsl(var(--foreground));
      background: hsl(var(--muted));
    }
    .sidebar-item.active {
      color: hsl(var(--foreground));
      border-left-color: hsl(var(--primary));
      background: hsl(var(--muted));
      font-weight: 500;
    }
    .sidebar-item.level-1 { padding-left: 28px; font-size: 12px; }
    .sidebar-item.level-2 { padding-left: 40px; font-size: 11px; }
    .sidebar-item .lucide { flex-shrink: 0; }

    /* ========== MAIN CONTENT ========== */
    .main-content {
      margin-left: var(--sidebar-width);
      margin-top: var(--header-height);
      padding: 32px 40px;
      max-width: 1100px;
    }

    /* ========== CARD (shadcn/ui style) ========== */
    .card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
    }
    .card-header:hover { background: hsl(var(--muted)); }
    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-body { padding: 20px; display: block; }
    .card-body.collapsed { display: none; }

    /* ========== BADGE (shadcn/ui style) ========== */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
    }
    .badge-default {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
    }
    .badge-secondary {
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
    }
    .badge-destructive {
      background: hsl(var(--destructive));
      color: hsl(var(--destructive-foreground));
    }
    .badge-success {
      background: hsl(var(--success));
      color: hsl(var(--success-foreground));
    }
    .badge-warning {
      background: hsl(var(--warning));
      color: hsl(var(--warning-foreground));
    }
    .badge-info {
      background: hsl(var(--info));
      color: hsl(var(--info-foreground));
    }
    .badge-outline {
      background: transparent;
      border: 1px solid hsl(var(--border));
      color: hsl(var(--foreground));
    }

    /* ========== ALERT (shadcn/ui style) ========== */
    .alert {
      padding: 14px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .alert-info {
      background: hsl(var(--info));
      color: hsl(var(--info-foreground));
    }
    .alert-warning {
      background: hsl(var(--warning));
      color: hsl(var(--warning-foreground));
    }
    .alert-destructive, .alert-error {
      background: hsl(var(--destructive));
      color: hsl(var(--destructive-foreground));
    }
    .alert-success {
      background: hsl(var(--success));
      color: hsl(var(--success-foreground));
    }

    /* ========== TABLES ========== */
    .md-table, .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .md-table th, .data-table th {
      text-align: left;
      padding: 12px 16px;
      background: hsl(var(--muted));
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: hsl(var(--muted-foreground));
      border-bottom: 1px solid hsl(var(--border));
    }
    .md-table td, .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid hsl(var(--border));
      vertical-align: top;
    }
    .md-table tr:last-child td, .data-table tr:last-child td { border-bottom: none; }
    .md-table tr:hover td, .data-table tr:hover td { background: hsl(var(--muted)); }
    .result-pass, .status-success { color: hsl(var(--success)); font-weight: 600; }
    .result-warn, .status-warning { color: hsl(var(--warning)); font-weight: 600; }
    .result-fail, .status-error { color: hsl(var(--destructive)); font-weight: 600; }

    /* ========== ACCORDION (shadcn/ui style) ========== */
    .accordion { display: flex; flex-direction: column; gap: 8px; }
    .accordion-item {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      overflow: hidden;
      border-left: 4px solid;
    }
    .accordion-item.type-p0, .accordion-item.type-critical { border-left-color: hsl(var(--destructive)); }
    .accordion-item.type-p1, .accordion-item.type-warning { border-left-color: hsl(var(--warning)); }
    .accordion-item.type-p2, .accordion-item.type-info { border-left-color: hsl(var(--info)); }
    .accordion-item.type-success { border-left-color: hsl(var(--success)); }

    .accordion-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .accordion-header:hover { background: hsl(var(--muted)); }

    .accordion-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .type-p0 .accordion-num, .type-critical .accordion-num {
      background: hsl(var(--destructive));
      color: hsl(var(--destructive-foreground));
    }
    .type-p1 .accordion-num, .type-warning .accordion-num {
      background: hsl(var(--warning));
      color: hsl(var(--warning-foreground));
    }
    .type-p2 .accordion-num, .type-info .accordion-num {
      background: hsl(var(--info));
      color: hsl(var(--info-foreground));
    }
    .type-success .accordion-num {
      background: hsl(var(--success));
      color: hsl(var(--success-foreground));
    }

    .accordion-title {
      font-size: 13px;
      font-weight: 600;
      color: hsl(var(--foreground));
      flex: 1;
      min-width: 0;
    }

    .accordion-content {
      display: none;
      padding: 0 16px 16px;
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    .accordion-item.open .accordion-content { display: block; }

    .chevron {
      color: hsl(var(--muted-foreground));
      transition: transform 0.2s ease;
    }
    .accordion-item.open .chevron { transform: rotate(180deg); }

    /* ========== CHART SECTION ========== */
    .charts-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 20px;
    }
    .chart-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: hsl(var(--foreground));
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-canvas-wrap { position: relative; height: 220px; }
    .chart-canvas-wrap.tall { height: 320px; }

    /* ========== MARKDOWN CONTENT ========== */
    .md-content h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      color: hsl(var(--foreground));
      padding-bottom: 12px;
      border-bottom: 1px solid hsl(var(--border));
    }
    .md-content h2 {
      font-size: 20px;
      font-weight: 600;
      margin: 28px 0 16px;
      color: hsl(var(--foreground));
    }
    .md-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 20px 0 12px;
      color: hsl(var(--foreground));
    }
    .md-content h4 {
      font-size: 14px;
      font-weight: 600;
      margin: 16px 0 8px;
      color: hsl(var(--muted-foreground));
    }
    .md-content p {
      margin-bottom: 12px;
      color: hsl(var(--muted-foreground));
    }
    .md-content ul, .md-content ol {
      margin: 8px 0 12px 20px;
      color: hsl(var(--muted-foreground));
    }
    .md-content li { margin-bottom: 4px; }
    .md-content strong {
      color: hsl(var(--foreground));
      font-weight: 600;
    }
    .md-content code {
      background: hsl(var(--muted));
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: hsl(var(--info));
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .md-content pre {
      background: hsl(var(--muted));
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .md-content pre code {
      background: none;
      color: hsl(var(--foreground));
      padding: 0;
    }
    .md-content blockquote {
      border-left: 3px solid hsl(var(--info));
      padding-left: 16px;
      margin: 16px 0;
      color: hsl(var(--muted-foreground));
      font-style: italic;
    }

    /* ========== CODE BLOCKS ========== */
    .code-block-wrapper {
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .code-header {
      background: hsl(var(--secondary));
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid hsl(var(--border));
    }
    .code-lang {
      font-size: 11px;
      color: hsl(var(--muted-foreground));
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      text-transform: uppercase;
    }
    .copy-btn {
      background: none;
      border: none;
      color: hsl(var(--muted-foreground));
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s ease;
    }
    .copy-btn:hover { color: hsl(var(--foreground)); background: hsl(var(--muted)); }
    .code-content {
      padding: 16px;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      line-height: 1.7;
    }

    /* ========== MERMAID ========== */
    .mermaid-block {
      position: relative;
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
      overflow-x: auto;
    }
    .mermaid-block .mermaid { display: inline-block; }
    .mermaid-block .zoom-hint {
      position: absolute;
      top: 8px;
      right: 8px;
      background: hsl(var(--secondary));
      color: hsl(var(--muted-foreground));
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .mermaid-block:hover .zoom-hint { opacity: 1; }

    /* ========== STATS ROW ========== */
    .stats-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
    }
    .stat-chip .n { font-size: 16px; font-weight: 700; }
    .stat-chip.text-destructive { color: hsl(var(--destructive)); }
    .stat-chip.text-warning { color: hsl(var(--warning)); }
    .stat-chip.text-success { color: hsl(var(--success)); }
    .stat-chip.text-info { color: hsl(var(--info)); }

    /* ========== TIMELINE ========== */
    .timeline {
      position: relative;
      padding-left: 28px;
      margin: 16px 0;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: hsl(var(--border));
      border-radius: 2px;
    }
    .timeline-item {
      position: relative;
      padding-bottom: 20px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -22px;
      top: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: hsl(var(--info));
      border: 3px solid hsl(var(--card));
    }
    .timeline-item.external::before { background: hsl(var(--muted-foreground)); }
    .timeline-item h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: hsl(var(--foreground));
    }
    .timeline-item.external h4 { color: hsl(var(--muted-foreground)); }
    .timeline-item p {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin: 0;
    }
    .timeline-item .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      background: hsl(var(--muted));
      color: hsl(var(--muted-foreground));
    }

    /* ========== STEP CARDS ========== */
    .step-cards { display: flex; flex-direction: column; gap: 12px; }
    .step-card {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
    }
    .step-card .step-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-card .step-content { flex: 1; min-width: 0; }
    .step-card .step-content h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: hsl(var(--foreground));
    }
    .step-card .step-content p {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin: 0;
    }

    /* ========== TOPIC CARDS ========== */
    .topic-cards { display: flex; flex-direction: column; gap: 16px; }
    .topic-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      overflow: hidden;
    }
    .topic-card .topic-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: hsl(var(--muted));
      border-bottom: 1px solid hsl(var(--border));
    }
    .topic-card .topic-num {
      font-size: 12px;
      font-weight: 700;
      color: hsl(var(--info));
      background: hsl(var(--info) / 0.1);
      padding: 4px 10px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .topic-card .topic-header h3 {
      font-size: 15px;
      font-weight: 600;
      color: hsl(var(--foreground));
      flex: 1;
      margin: 0;
    }
    .topic-card .topic-body { padding: 16px; }
    .topic-card .topic-body p {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin: 0 0 12px 0;
    }
    .topic-card .topic-body p:last-child { margin-bottom: 0; }

    /* ========== FEATURE GRID ========== */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .feature-item {
      display: flex;
      gap: 12px;
      padding: 14px;
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
    }
    .feature-item .feature-icon {
      color: hsl(var(--info));
      flex-shrink: 0;
    }
    .feature-item .feature-content h4 {
      font-size: 13px;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin: 0 0 4px 0;
    }
    .feature-item .feature-content p {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      margin: 0;
    }

    /* ========== POINT CARDS ========== */
    .point-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .point-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
    }
    .point-card .point-icon { color: hsl(var(--success)); flex-shrink: 0; }
    .point-card .point-text {
      font-size: 13px;
      color: hsl(var(--foreground));
    }

    /* ========== ENHANCED LIST ========== */
    .enhanced-list { list-style: none; margin: 0; padding: 0; }
    .enhanced-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid hsl(var(--border));
    }
    .enhanced-list li:last-child { border-bottom: none; }
    .enhanced-list .list-marker { color: hsl(var(--info)); font-size: 14px; }
    .enhanced-list .list-text {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }

    /* ========== TOPIC LIST ========== */
    .topic-list { list-style: none; margin: 0; padding: 0; }
    .topic-list li {
      padding: 12px 0;
      border-bottom: 1px solid hsl(var(--border));
    }
    .topic-list li:last-child { border-bottom: none; }
    .topic-list .list-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .topic-list .list-title .marker {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: hsl(var(--info));
      flex-shrink: 0;
    }
    .topic-list .list-title strong {
      font-size: 14px;
      color: hsl(var(--foreground));
    }
    .topic-list .list-desc {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      padding-left: 16px;
    }
    .topic-list .list-body {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      padding: 10px 12px;
      margin-top: 8px;
      background: hsl(var(--muted));
      border-radius: var(--radius);
    }

    /* ========== KV GRID ========== */
    .kv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .kv-item {
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 12px;
    }
    .kv-item .kv-label {
      font-size: 11px;
      color: hsl(var(--muted-foreground));
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kv-item .kv-value {
      font-size: 14px;
      font-weight: 600;
      color: hsl(var(--foreground));
    }
    .kv-item .kv-desc {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      margin-top: 4px;
    }

    /* ========== QUICK SUMMARY ========== */
    .quick-summary {
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      line-height: 1.8;
    }
    .quick-summary strong { color: hsl(var(--foreground)); }
    .quick-summary .highlight { color: hsl(var(--info)); font-weight: 500; }

    /* ========== MERMAID MODAL ========== */
    .mermaid-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: hsl(var(--background) / 0.8);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    .mermaid-modal.open { display: flex; }
    .mermaid-modal-content {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      max-width: 95vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .mermaid-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid hsl(var(--border));
      background: hsl(var(--muted));
      gap: 12px;
    }
    .mermaid-modal-title {
      font-size: 14px;
      font-weight: 600;
      color: hsl(var(--foreground));
    }
    .mermaid-modal-actions { display: flex; gap: 6px; }
    .mermaid-modal-btn {
      background: hsl(var(--secondary));
      border: 1px solid hsl(var(--border));
      color: hsl(var(--muted-foreground));
      padding: 6px 12px;
      border-radius: var(--radius);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mermaid-modal-btn:hover {
      background: hsl(var(--info));
      color: hsl(var(--info-foreground));
      border-color: hsl(var(--info));
    }
    .mermaid-modal-body {
      padding: 24px;
      overflow: auto;
      text-align: center;
      max-height: calc(90vh - 60px);
      min-width: 60vw;
    }
    .mermaid-modal-body svg { max-width: 100%; height: auto; }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: hsl(var(--background)); }
    ::-webkit-scrollbar-thumb {
      background: hsl(var(--border));
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground)); }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 20px 16px; }
      .top-header h1 { font-size: 14px; }
      .top-header .meta { display: none; }
      .charts-row { grid-template-columns: 1fr; }
    }

    /* ========== PRINT ========== */
    @media print {
      .sidebar, .top-header { display: none !important; }
      .main-content { margin: 0; padding: 20px; }
      .card-body { display: block !important; }
      .accordion-content { display: block !important; }
    }
  </style>
</head>
<body>

<!-- ========== TOP HEADER ========== -->
<div class="top-header">
  <div>
    <h1>
      <i data-lucide="file-text" class="lucide"></i>
      __REPORT_TITLE__
    </h1>
    <div class="meta">
      __REPORT_META__
    </div>
  </div>
  <div class="header-right">
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="theme-toggle-btn" title="切换主题" onclick="toggleTheme()">
      <i data-lucide="sun" class="lucide"></i>
      <i data-lucide="moon" class="lucide hidden"></i>
    </button>
  </div>
</div>

<!-- ========== SIDEBAR NAVIGATION ========== -->
<nav class="sidebar" id="sidebar">
  __SIDEBAR_NAV__
</nav>

<!-- ========== MAIN CONTENT ========== -->
<main class="main-content">

  <!-- Quick Summary -->
  __QUICK_SUMMARY__

  <!-- Charts Row -->
  __CHARTS_HTML__

  <!-- Markdown Content (rendered sections) -->
  __MD_CONTENT__

</main>

<!-- ========== MERMAID LIGHTBOX MODAL ========== -->
<div id="mermaid-modal" class="mermaid-modal" onclick="if(event.target===this)closeMermaidModal()">
  <div class="mermaid-modal-content">
    <div class="mermaid-modal-header">
      <span class="mermaid-modal-title" id="mermaid-modal-title">
        <i data-lucide="git-branch" class="lucide-sm"></i>
        流程图
      </span>
      <div class="mermaid-modal-actions">
        <button class="mermaid-modal-btn" onclick="zoomMermaid(1.2)" title="放大">
          <i data-lucide="zoom-in" class="lucide-sm"></i>
        </button>
        <button class="mermaid-modal-btn" onclick="zoomMermaid(0.8)" title="缩小">
          <i data-lucide="zoom-out" class="lucide-sm"></i>
        </button>
        <button class="mermaid-modal-btn" onclick="zoomMermaid(1)" title="重置">
          <i data-lucide="maximize-2" class="lucide-sm"></i>
        </button>
        <button class="mermaid-modal-btn" onclick="closeMermaidModal()" title="关闭">
          <i data-lucide="x" class="lucide-sm"></i>
        </button>
      </div>
    </div>
    <div class="mermaid-modal-body" id="mermaid-modal-body"></div>
  </div>
</div>

<script>
  /* ========== LUCIDE ICONS INIT ========== */
  lucide.createIcons();

  /* ========== THEME TOGGLE ========== */
  let currentTheme = 'dark';

  function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    currentTheme = saved || (prefersDark ? 'dark' : 'light');

    document.documentElement.classList.remove('dark', 'light');
    document.documentElement.classList.add(currentTheme);

    // 设置正确的图标
    const sunIcon = document.querySelector('#theme-toggle [data-lucide="sun"]');
    const moonIcon = document.querySelector('#theme-toggle [data-lucide="moon"]');
    if (sunIcon && moonIcon) {
      sunIcon.classList.toggle('hidden', currentTheme !== 'dark');
      moonIcon.classList.toggle('hidden', currentTheme === 'dark');
    }

    // 初始化 Mermaid 主题
    initMermaidTheme(currentTheme === 'dark');
  }

  function toggleTheme() {
    const html = document.documentElement;
    html.classList.add('transitioning');

    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    html.classList.remove('dark', 'light');
    html.classList.add(currentTheme);
    localStorage.setItem('theme', currentTheme);

    // 切换图标显示
    const sunIcon = document.querySelector('#theme-toggle [data-lucide="sun"]');
    const moonIcon = document.querySelector('#theme-toggle [data-lucide="moon"]');
    if (sunIcon && moonIcon) {
      sunIcon.classList.toggle('hidden', currentTheme !== 'dark');
      moonIcon.classList.toggle('hidden', currentTheme === 'dark');
    }

    // 更新 Mermaid 主题
    updateMermaidTheme(currentTheme === 'dark');

    // 更新 Chart.js 图表颜色
    updateChartColors(currentTheme === 'dark');

    // 移除过渡类
    setTimeout(() => html.classList.remove('transitioning'), 300);
  }

  /* ========== MERMAID THEME ========== */
  const mermaidThemes = {
    dark: {
      theme: 'dark',
      themeVariables: {
        primaryColor: '#3b82f6',
        primaryTextColor: '#fafafa',
        primaryBorderColor: '#27272a',
        lineColor: '#a1a1aa',
        secondaryColor: '#27272a',
        tertiaryColor: '#09090b',
        fontSize: '14px',
        background: '#09090b',
        mainBkg: '#27272a',
        nodeBorder: '#3b82f6',
        clusterBkg: '#27272a',
        titleColor: '#fafafa',
        edgeLabelBackground: '#27272a'
      }
    },
    light: {
      theme: 'default',
      themeVariables: {
        primaryColor: '#3b82f6',
        primaryTextColor: '#09090b',
        primaryBorderColor: '#e4e4e7',
        lineColor: '#71717a',
        secondaryColor: '#f4f4f5',
        tertiaryColor: '#ffffff',
        fontSize: '14px',
        background: '#ffffff',
        mainBkg: '#f4f4f5',
        nodeBorder: '#3b82f6',
        clusterBkg: '#f4f4f5',
        titleColor: '#09090b',
        edgeLabelBackground: '#f4f4f5'
      }
    }
  };

  function initMermaidTheme(isDark) {
    const config = isDark ? mermaidThemes.dark : mermaidThemes.light;
    mermaid.initialize({
      startOnLoad: true,
      ...config
    });
  }

  function updateMermaidTheme(isDark) {
    const config = isDark ? mermaidThemes.dark : mermaidThemes.light;
    mermaid.initialize({
      startOnLoad: false,
      ...config
    });
    // 重新渲染所有 Mermaid 图表
    document.querySelectorAll('.mermaid').forEach(el => {
      el.removeAttribute('data-processed');
      el.innerHTML = el.getAttribute('data-original') || el.textContent;
    });
    mermaid.init(undefined, document.querySelectorAll('.mermaid'));
  }

  /* ========== CHART.JS THEME ========== */
  function updateChartColors(isDark) {
    const colors = isDark
      ? { text: '#fafafa', grid: '#27272a' }
      : { text: '#09090b', grid: '#e4e4e7' };

    Chart.defaults.color = colors.text;
    Chart.defaults.borderColor = colors.grid;

    // 更新现有图表
    Chart.instances.forEach(chart => {
      chart.options.color = colors.text;
      chart.options.borderColor = colors.grid;
      if (chart.options.scales) {
        Object.values(chart.options.scales).forEach(scale => {
          if (scale.ticks) scale.ticks.color = colors.text;
          if (scale.grid) scale.grid.color = colors.grid;
          if (scale.title) scale.title.color = colors.text;
        });
      }
      if (chart.options.plugins && chart.options.plugins.legend) {
        chart.options.plugins.legend.labels.color = colors.text;
      }
      chart.update();
    });
  }

  // 初始化主题
  initTheme();

  /* ========== COLLAPSIBLE SECTIONS ========== */
  document.querySelectorAll('.card-header').forEach(h => {
    h.addEventListener('click', () => {
      h.classList.toggle('open');
      const body = h.nextElementSibling;
      if (body) body.classList.toggle('collapsed');
    });
  });

  /* ========== COLLAPSIBLE ACCORDION ITEMS ========== */
  document.querySelectorAll('.accordion-header').forEach(h => {
    h.addEventListener('click', () => {
      h.closest('.accordion-item').classList.toggle('open');
    });
  });

  /* ========== SIDEBAR SCROLL SPY ========== */
  const sections = document.querySelectorAll('[id^="sec-"]');
  const nav = document.getElementById('sidebar');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        nav.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        const link = nav.querySelector(`[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -70% 0px' });
  sections.forEach(s => observer.observe(s));

  /* ========== HIGHLIGHT.JS ========== */
  if (typeof hljs !== 'undefined') {
    document.querySelectorAll('.code-content code').forEach(block => {
      hljs.highlightElement(block);
    });
  }

  /* ========== CHART.JS INIT ========== */
  __CHART_INIT__

  /* ========== MERMAID LIGHTBOX ========== */
  let mermaidScale = 1;

  function openMermaidModal(svgEl, title) {
    const modal = document.getElementById('mermaid-modal');
    const body = document.getElementById('mermaid-modal-body');
    const titleEl = document.getElementById('mermaid-modal-title');
    const clone = svgEl.cloneNode(true);
    clone.style.transform = `scale(${mermaidScale})`;
    clone.style.transformOrigin = 'top center';
    clone.style.transition = 'transform 0.2s';
    body.innerHTML = '';
    body.appendChild(clone);
    titleEl.innerHTML = `<i data-lucide="git-branch" class="lucide-sm"></i> ${title || '流程图'}`;
    lucide.createIcons();
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeMermaidModal() {
    document.getElementById('mermaid-modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function zoomMermaid(factor) {
    mermaidScale = factor;
    const svg = document.querySelector('#mermaid-modal-body svg');
    if (svg) { svg.style.transform = `scale(${mermaidScale})`; }
  }

  function attachMermaidZoom() {
    document.querySelectorAll('.mermaid-block .mermaid svg').forEach(svg => {
      if (svg.dataset.zoomAttached) return;
      svg.dataset.zoomAttached = '1';
      const block = svg.closest('.mermaid-block');
      let title = '流程图';
      if (block) {
        const prev = block.previousElementSibling;
        if (prev && (prev.tagName === 'H3' || prev.tagName === 'H4')) {
          title = prev.textContent.trim();
        }
      }
      svg.style.cursor = 'zoom-in';
      svg.addEventListener('click', () => openMermaidModal(svg, title));
      if (block && !block.querySelector('.zoom-hint')) {
        const hint = document.createElement('span');
        hint.className = 'zoom-hint';
        hint.innerHTML = '<i data-lucide="maximize-2" class="lucide-sm"></i> 点击放大';
        block.appendChild(hint);
        lucide.createIcons();
      }
    });
  }

  if (typeof MutationObserver !== 'undefined') {
    const obs = new MutationObserver(() => attachMermaidZoom());
    document.querySelectorAll('.mermaid-block').forEach(block => {
      obs.observe(block, { childList: true, subtree: true });
    });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMermaidModal();
  });

  /* ========== COPY CODE ========== */
  function copyCode(btn) {
    const code = btn.closest('.code-block-wrapper').querySelector('code');
    navigator.clipboard.writeText(code.textContent);
    const icons = btn.querySelectorAll('.lucide');
    icons[0].style.display = 'none';
    icons[1].style.display = 'inline';
    setTimeout(() => {
      icons[0].style.display = 'inline';
      icons[1].style.display = 'none';
    }, 2000);
  }
</script>

</body>
</html>

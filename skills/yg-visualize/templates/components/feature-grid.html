<!-- Feature Grid Component -->
<!-- Use for unordered feature lists -->
<!-- SubAgent: Replace {{feature-title}}, {{feature-desc}}, {{icon-name}} placeholders -->
<!-- SubAgent: Copy .feature-item div for multiple features -->

<style>
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .feature-item {
    display: flex;
    gap: 16px;
    padding: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: all 0.2s ease;
  }

  .feature-item:hover {
    border-color: var(--primary);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.08);
    transform: translateY(-2px);
  }

  .feature-icon {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary), var(--chart-color-5, #8b5cf6));
    color: white;
    border-radius: 10px;
  }

  .feature-icon i {
    width: 24px;
    height: 24px;
  }

  .feature-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .feature-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--foreground);
  }

  .feature-desc {
    font-size: 13px;
    color: var(--muted-foreground);
    line-height: 1.5;
  }
</style>

<div class="feature-grid">
  <!-- Example feature item - copy this for multiple features -->
  <div class="feature-item">
    <div class="feature-icon">
      <i data-lucide="{{icon-name}"></i>
    </div>
    <div class="feature-content">
      <div class="feature-title">{{feature-title}}</div>
      <div class="feature-desc">{{feature-desc}}</div>
    </div>
  </div>
  <!-- End example feature item -->
</div>

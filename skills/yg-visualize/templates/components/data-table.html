<!-- Data Table Component -->
<!-- Use for structured table data -->
<!-- SubAgent: Replace {{col-header-N}} and {{cell-row-col}} placeholders -->
<!-- SubAgent: Copy <tr> within tbody for multiple rows -->

<style>
  .table-container {
    overflow-x: auto;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  .data-table thead {
    background: var(--muted);
  }

  .data-table th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--foreground);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .data-table td {
    padding: 12px 16px;
    color: var(--foreground);
    border-bottom: 1px solid var(--border);
  }

  .data-table tbody tr:last-child td {
    border-bottom: none;
  }

  .data-table tbody tr:hover {
    background: var(--muted);
  }

  .table-status {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }

  .table-status.status-active {
    background: rgba(16, 185, 129, 0.1);
    color: #10b981;
  }

  .table-status.status-pending {
    background: rgba(245, 158, 11, 0.1);
    color: #f59e0b;
  }

  .table-status.status-inactive {
    background: rgba(107, 114, 128, 0.1);
    color: #6b7280;
  }
</style>

<div class="table-container">
  <table class="data-table">
    <thead>
      <tr>
        <th>{{col-header-1}}</th>
        <th>{{col-header-2}}</th>
        <th>{{col-header-3}}</th>
        <th>{{col-header-4}}</th>
      </tr>
    </thead>
    <tbody>
      <!-- Example row - copy this for multiple rows -->
      <tr>
        <td>{{cell-1-1}}</td>
        <td>{{cell-1-2}}</td>
        <td>{{cell-1-3}}</td>
        <td>{{cell-1-4}}</td>
      </tr>
      <!-- End example row -->
    </tbody>
  </table>
</div>

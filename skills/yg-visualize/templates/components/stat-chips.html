<!-- Stat Chips Component -->
<!-- Use for quick stats display -->
<!-- SubAgent: Replace {{stat-label}} and {{stat-value}} placeholders -->
<!-- SubAgent: Copy .stat-chip div for multiple stats -->

<style>
  .stat-chips-container {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }

  .stat-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 28px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-width: 140px;
    transition: all 0.2s ease;
  }

  .stat-chip:hover {
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(59, 130, 246, 0.1);
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.2;
  }

  .stat-label {
    font-size: 13px;
    color: var(--muted-foreground);
    margin-top: 4px;
    text-align: center;
  }

  .stat-chip.stat-highlight {
    background: linear-gradient(135deg, var(--primary), var(--chart-color-5, #8b5cf6));
    border-color: transparent;
  }

  .stat-chip.stat-highlight .stat-value {
    color: white;
  }

  .stat-chip.stat-highlight .stat-label {
    color: rgba(255, 255, 255, 0.85);
  }
</style>

<div class="stat-chips-container">
  <!-- Example stat chip - copy this for multiple stats -->
  <div class="stat-chip">
    <div class="stat-value">{{stat-value}}</div>
    <div class="stat-label">{{stat-label}}</div>
  </div>
  <!-- End example stat chip -->
</div>

<!-- Chart Card Component -->
<!-- Use for Chart.js containers -->
<!-- SubAgent: Replace {{chart-type}}, {{chart-id}}, {{chart-title}}, {{chart-labels}}, {{chart-data}} placeholders -->
<!-- chart-type: bar, line, pie, doughnut, radar, polarArea -->
<!-- SubAgent: Copy entire .chart-card div for multiple charts -->

<style>
  .chart-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .chart-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--foreground);
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted-foreground);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .chart-body {
    padding: 20px;
    height: 300px;
  }

  .chart-body canvas {
    width: 100% !important;
    height: 100% !important;
  }
</style>

<div class="chart-card">
  <div class="chart-header">
    <span class="chart-title">{{chart-title}}</span>
    <div class="chart-legend">
      <!-- Legend items will be generated dynamically -->
    </div>
  </div>
  <div class="chart-body">
    <canvas id="{{chart-id}}"></canvas>
  </div>
</div>

<script>
  // Chart.js configuration template
  // SubAgent: Customize this configuration based on chart requirements
  (function() {
    const ctx = document.getElementById('{{chart-id}}');
    if (!ctx) return;

    const chartColors = [
      getComputedStyle(document.documentElement).getPropertyValue('--chart-color-1').trim() || '#3b82f6',
      getComputedStyle(document.documentElement).getPropertyValue('--chart-color-2').trim() || '#10b981',
      getComputedStyle(document.documentElement).getPropertyValue('--chart-color-3').trim() || '#f59e0b',
      getComputedStyle(document.documentElement).getPropertyValue('--chart-color-4').trim() || '#ef4444',
      getComputedStyle(document.documentElement).getPropertyValue('--chart-color-5').trim() || '#8b5cf6'
    ];

    new Chart(ctx, {
      type: '{{chart-type}}',
      data: {
        labels: {{chart-labels}},
        datasets: [{
          label: '{{chart-title}}',
          data: {{chart-data}},
          backgroundColor: chartColors.map(c => c + '80'),
          borderColor: chartColors,
          borderWidth: 2,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: {
              color: 'rgba(0, 0, 0, 0.05)'
            }
          },
          x: {
            grid: {
              display: false
            }
          }
        }
      }
    });
  })();
</script>

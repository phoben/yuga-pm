<!-- Code Block Component -->
<!-- Use for code display with copy button -->
<!-- SubAgent: Replace {{code-lang}} and {{code-content}} placeholders -->
<!-- SubAgent: Ensure {{code-content}} is properly escaped/encoded -->

<style>
  .code-block {
    background: #1e1e1e;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #2d2d2d;
    border-bottom: 1px solid #404040;
  }

  .code-lang {
    font-size: 12px;
    font-weight: 500;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid #404040;
    border-radius: 4px;
    color: #9ca3af;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    background: #404040;
    color: #ffffff;
  }

  .copy-btn i {
    width: 14px;
    height: 14px;
  }

  .copy-btn.copied {
    background: rgba(16, 185, 129, 0.2);
    border-color: #10b981;
    color: #10b981;
  }

  .code-content {
    padding: 16px;
    overflow-x: auto;
    margin: 0;
  }

  .code-content code {
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    color: #d4d4d4;
    background: transparent;
    padding: 0;
  }
</style>

<div class="code-block">
  <div class="code-header">
    <span class="code-lang">{{code-lang}}</span>
    <button class="copy-btn" onclick="copyCode(this)">
      <i data-lucide="copy"></i>
      <span>Copy</span>
    </button>
  </div>
  <pre class="code-content"><code class="language-{{code-lang}}">{{code-content}}</code></pre>
</div>

<script>
  function copyCode(btn) {
    const code = btn.closest('.code-block').querySelector('code').textContent;
    navigator.clipboard.writeText(code).then(() => {
      btn.classList.add('copied');
      btn.querySelector('span').textContent = 'Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.querySelector('span').textContent = 'Copy';
      }, 2000);
    });
  }
</script>

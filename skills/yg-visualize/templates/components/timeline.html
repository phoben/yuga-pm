<!-- Timeline Component -->
<!-- Use for date/time-based event sequences -->
<!-- SubAgent: Replace {{timeline-date}}, {{timeline-title}}, {{timeline-desc}} placeholders -->
<!-- SubAgent: Copy .timeline-item div for multiple events -->

<style>
  .timeline-container {
    position: relative;
    padding-left: 32px;
  }

  .timeline-container::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  .timeline-item {
    position: relative;
    padding-bottom: 24px;
  }

  .timeline-item:last-child {
    padding-bottom: 0;
  }

  .timeline-dot {
    position: absolute;
    left: -28px;
    top: 4px;
    width: 12px;
    height: 12px;
    background: var(--primary);
    border: 2px solid var(--background);
    border-radius: 50%;
    z-index: 1;
  }

  .timeline-item.completed .timeline-dot {
    background: var(--chart-color-2, #10b981);
  }

  .timeline-item.pending .timeline-dot {
    background: var(--chart-color-3, #f59e0b);
  }

  .timeline-date {
    font-size: 12px;
    font-weight: 500;
    color: var(--primary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .timeline-content {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .timeline-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--foreground);
    margin-bottom: 4px;
  }

  .timeline-desc {
    font-size: 14px;
    color: var(--muted-foreground);
    line-height: 1.5;
  }
</style>

<div class="timeline-container">
  <!-- Example timeline item - copy this for multiple events -->
  <div class="timeline-item">
    <div class="timeline-dot"></div>
    <div class="timeline-date">{{timeline-date}}</div>
    <div class="timeline-content">
      <div class="timeline-title">{{timeline-title}}</div>
      <div class="timeline-desc">{{timeline-desc}}</div>
    </div>
  </div>
  <!-- End example timeline item -->
</div>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{doc-title}}</title>

  <!-- CDN Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      /* Colors - Dark Theme */
      --primary: #60a5fa;
      --primary-foreground: #0f172a;
      --secondary: #475569;
      --secondary-foreground: #f1f5f9;
      --background: #0f172a;
      --foreground: #f1f5f9;
      --card-bg: #1e293b;
      --card-border: #334155;
      --border: #334155;
      --muted: #1e293b;
      --muted-foreground: #94a3b8;

      /* Chart Colors - Adjusted for dark bg */
      --chart-color-1: #60a5fa;
      --chart-color-2: #34d399;
      --chart-color-3: #fbbf24;
      --chart-color-4: #f87171;
      --chart-color-5: #a78bfa;

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;

      /* Spacing */
      --radius: 8px;
      --sidebar-width: 260px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--foreground);
      line-height: 1.6;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--muted);
      border-right: 1px solid var(--border);
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 24px 16px;
    }

    .sidebar-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .doc-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--foreground);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: block;
      padding: 8px 12px;
      border-radius: var(--radius);
      color: var(--muted-foreground);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }

    .nav-item:hover,
    .nav-item[data-active="true"] {
      background: var(--background);
      color: var(--foreground);
    }

    .nav-item[data-level="1"] { padding-left: 12px; font-weight: 500; }
    .nav-item[data-level="2"] { padding-left: 24px; font-size: 13px; }
    .nav-item[data-level="3"] { padding-left: 36px; font-size: 12px; }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: 32px 48px;
      max-width: 900px;
    }

    .content-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .content-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .content-meta {
      display: flex;
      gap: 16px;
      font-size: 14px;
      color: var(--muted-foreground);
    }

    .content-body {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    section[data-region="true"] {
      scroll-margin-top: 24px;
    }

    section h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    section h3 {
      font-size: 18px;
      font-weight: 500;
      margin: 24px 0 12px;
    }

    section p {
      margin-bottom: 12px;
    }

    section ul, section ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    section li {
      margin-bottom: 6px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      .sidebar.open { transform: translateX(0); }
      .main-content {
        margin-left: 0;
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" data-fill="sidebar">
      <div class="sidebar-header">
        <h1 class="doc-title" data-fill="doc-title">{{doc-title}}</h1>
      </div>
      <nav class="sidebar-nav" data-fill="nav">
        <!-- Main Agent fills navigation items -->
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="content-header" data-fill="header">
        <!-- Main Agent fills document meta info -->
      </header>

      <article class="content-body" data-fill="content">
        <!-- Sections generated dynamically -->
      </article>
    </main>
  </div>

  <!-- Interaction Scripts -->
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Initialize Mermaid - Dark Theme
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });

    // Initialize Highlight.js
    hljs.highlightAll();

    // Scroll spy for navigation
    const sections = document.querySelectorAll('section[data-region="true"]');
    const navItems = document.querySelectorAll('.nav-item');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navItems.forEach(item => {
            item.dataset.active = item.getAttribute('href') === '#' + entry.target.id;
          });
        }
      });
    }, { threshold: 0.2 });

    sections.forEach(section => observer.observe(section));

    // Smooth scroll
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector(item.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>

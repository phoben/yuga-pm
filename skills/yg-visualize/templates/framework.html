<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{doc-title}}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['class', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: {
              DEFAULT: 'hsl(var(--primary))',
              foreground: 'hsl(var(--primary-foreground))'
            },
            secondary: {
              DEFAULT: 'hsl(var(--secondary))',
              foreground: 'hsl(var(--secondary-foreground))'
            },
            destructive: {
              DEFAULT: 'hsl(var(--destructive))',
              foreground: 'hsl(var(--destructive-foreground))'
            },
            muted: {
              DEFAULT: 'hsl(var(--muted))',
              foreground: 'hsl(var(--muted-foreground))'
            },
            accent: {
              DEFAULT: 'hsl(var(--accent))',
              foreground: 'hsl(var(--accent-foreground))'
            },
            popover: {
              DEFAULT: 'hsl(var(--popover))',
              foreground: 'hsl(var(--popover-foreground))'
            },
            card: {
              DEFAULT: 'hsl(var(--card))',
              foreground: 'hsl(var(--card-foreground))'
            }
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)'
          }
        }
      }
    }
  </script>

  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Mermaid for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      useMaxWidth: true,
      themeVariables: {
        primaryColor: '#3b82f6',
        primaryTextColor: '#ffffff',
        primaryBorderColor: '#2563eb',
        lineColor: '#94a3b8',
        secondaryColor: '#8b5cf6',
        tertiaryColor: '#f1f5f9',
      },
      flowchart: {
        padding: 15,
        curve: 'basis'
      },
      gantt: {
        barHeight: 20,
        barGap: 4,
        topPadding: 50,
        leftPadding: 75,
        gridLineStartPadding: 35,
        fontSize: 12,
        topAxis: false,
        displayMode: 'compact',
        useMaxWidth: true,
        useWidth: 1000
      },
      sequence: {
        mirrorActors: false,
        bottomMarginAdj: 1,
        actorMargin: 50
      }
    });
  </script>

  <!-- html2pdf.js for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="./framework.css">
</head>
<body class="bg-background text-foreground antialiased">
  <!-- PDF Only: Cover Page & Table of Contents (hidden in browser, visible in PDF) -->
  <div class="pdf-only">
    <!-- Cover Page -->
    <div class="pdf-cover">
      <div class="pdf-cover-content">
        <div class="pdf-cover-badge">文档</div>
        <h1 class="pdf-cover-title" data-fill="pdf-cover-title">{{doc-title}}</h1>
        <div class="pdf-cover-subtitle" data-fill="pdf-cover-project">{{project-name}}</div>
        <div class="pdf-cover-meta">
          <div class="pdf-cover-meta-item">
            <span class="pdf-cover-label">版本</span>
            <span class="pdf-cover-value" data-fill="pdf-cover-version">{{version}}</span>
          </div>
          <div class="pdf-cover-meta-item">
            <span class="pdf-cover-label">日期</span>
            <span class="pdf-cover-value" data-fill="pdf-cover-date">{{date}}</span>
          </div>
        </div>
      </div>
      <div class="pdf-cover-footer">
        云之初信息科技有限公司
      </div>
    </div>

    <!-- Table of Contents -->
    <nav class="pdf-toc">
      <h2 class="pdf-toc-title">目录</h2>
      <div class="pdf-toc-content" data-fill="pdf-toc-content">
        <!-- TOC items generated by Main Agent based on document structure -->
      </div>
    </nav>
  </div>

  <!-- Fixed Top Header -->
  <header class="fixed top-0 left-0 right-0 h-16 bg-background/80 backdrop-blur-sm border-b z-50">
    <div class="flex items-center justify-between h-full px-4 md:px-8">
      <!-- 汉堡菜单按钮（仅移动端显示） -->
      <button
        id="sidebar-toggle"
        class="md:hidden inline-flex items-center justify-center w-10 h-10 -ml-2 mr-2 rounded-md border border-input bg-background hover:bg-accent hover:text-accent-foreground transition-colors"
        aria-label="打开导航菜单"
        title="打开导航菜单"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex items-center gap-4">
        <span class="text-sm font-semibold" data-fill="header-title">{{doc-title}}</span>
        <div class="hidden md:flex md:gap-2" data-fill="header-tags">
          <!-- Tags populated by Agent -->
        </div>
      </div>
      <div class="flex items-center gap-1.5 md:gap-3">
        <!-- Toggle All Accordions Button -->
        <button
          id="toggle-accordions-btn"
          onclick="toggleAllAccordions()"
          class="inline-flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-md border border-input bg-background hover:bg-accent hover:text-accent-foreground"
          aria-label="Toggle all accordions"
          title="展开/收缩所有折叠面板"
        >
          <!-- 展开状态图标 (eye): 点击后折叠 -->
          <svg class="w-4 h-4 md:w-5 md:h-5 accordion-icon-expand" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- 折叠状态图标 (eye-off): 点击后展开 -->
          <svg class="w-4 h-4 md:w-5 md:h-5 accordion-icon-collapse hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
            <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
            <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
            <path d="m2 2 20 20"/>
          </svg>
        </button>
        <!-- Export PDF Button -->
        <button
          id="export-pdf-btn"
          onclick="exportPDF()"
          class="inline-flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-md border border-input bg-background hover:bg-accent hover:text-accent-foreground"
          aria-label="导出PDF"
          title="导出为PDF文档"
        >
          <!-- 打印图标 (printer) -->
          <svg class="w-4 h-4 md:w-5 md:h-5 export-icon-printer" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
          <!-- 加载图标 (loader-2) -->
          <svg class="w-4 h-4 md:w-5 md:h-5 export-icon-loader hidden animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-6.219-8.56"></path>
          </svg>
        </button>
        <!-- Theme Toggle Button -->
        <button
          onclick="toggleTheme()"
          class="inline-flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-md border border-input bg-background hover:bg-accent hover:text-accent-foreground"
          aria-label="Toggle theme"
        >
          <svg class="w-4 h-4 md:w-5 md:h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg class="w-4 h-4 md:w-5 md:h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="flex min-h-screen pt-16 justify-center">
    <!-- 遮罩层（仅移动端显示） -->
    <div id="sidebar-overlay" class="sidebar-overlay md:hidden"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="sidebar w-[280px] fixed left-0 top-16 bottom-0 bg-muted border-r overflow-y-auto p-6">
      <nav class="space-y-1" data-fill="nav">
        <!-- Navigation items populated by Main Agent -->
        <!-- FORMAT: 禁用状态（内容未填充）
        <a href="#section-N" class="nav-item" data-pending="true">章节标题</a>
        -->
        <!-- FORMAT: 正常状态（内容已填充）
        <a href="#section-N" class="nav-item" data-pending="false">章节标题</a>
        -->
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content flex-1 ml-[280px] p-4 max-w-5xl">
      <!-- Document Header: H1 + Meta Info (filled by Main Agent) -->
      <header class="mb-10 pb-6 border-b" data-fill="header">
        <!-- MAIN AGENT: Fill with H1 title + document meta info (version, date, status, etc.) -->
        <!-- FORMAT EXAMPLE:
        <h1 class="text-3xl font-bold tracking-tight">文档标题</h1>
        <div class="mt-4 flex flex-wrap gap-4 text-sm text-muted-foreground">
          <span><strong>版本：</strong>v1.0</span>
          <span><strong>日期：</strong>2026-03-24</span>
          <span><strong>状态：</strong>待确认</span>
        </div>
        -->
      </header>

      <article class="space-y-10" data-fill="content">
        <!-- ============================================
             SECTIONS GENERATED BY MAIN AGENT
             Each section has a placeholder for SubAgent
             ============================================ -->

        <!-- SECTION TEMPLATE WITH SKELETON (repeated for each H2):
        <section id="section-N" data-region="true" class="scroll-mt-20">
          <h2 class="text-2xl font-bold tracking-tight mb-4 pb-2 border-b">章节标题</h2>
          <div class="space-y-6" data-fill="section-section-N" data-section-id="section-N">
            <div class="skeleton-container" data-skeleton="section-N">
              <div class="skeleton skeleton-title"></div>
              <div class="skeleton skeleton-text full"></div>
              <div class="skeleton skeleton-text medium"></div>
              <div class="skeleton skeleton-text short"></div>
              <div class="skeleton skeleton-card"></div>
              <div class="skeleton skeleton-text full"></div>
              <div class="skeleton skeleton-text medium"></div>
            </div>
            <!-- SUBAGENT: FILL section-section-N -->
          </div>
        </section>
        -->

        {{sections}}
      </article>
    </main>
  </div>

  <!-- External JS -->
  <script src="./framework.js"></script>
</body>
</html>
